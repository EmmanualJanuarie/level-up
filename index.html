<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Level Up</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <div id="restDay" class="rest-screen hidden">
        <div class="rest-card">
            <h1>Recovery Day</h1>
            <p>Growth happens during recovery. Come back tomorrow.</p>
        </div>
    </div>

    <div id="workoutContainer">

        <div class="exercise-card">

            <div class="card-top">
                <h1 class="title">Level Up</h1>
                <p class="day" id="dayTitle"></p>
                <div class="exercise-label">Today's Mission</div>
            </div>

            <div class="card-middle">

                <h2 id="exerciseName" class="exercise-name"></h2>

                <div class="stats">
                    <div class="stat-box">
                        <span>Sets</span>
                        <h3 id="sets"></h3>
                    </div>

                    <div class="stat-box">
                        <span>Reps</span>
                        <h3 id="reps"></h3>
                    </div>
                </div>

                <div class="extra-stats">
                    <div class="extra-box">
                        <span>Rest Time</span>
                        <h3 id="restTime"></h3>
                    </div>

                    <div class="extra-box">
                        <span>Tempo</span>
                        <h3 id="tempo"></h3>
                    </div>
                </div>

            </div>

            <div class="card-bottom">
                <div class="swipe-indicator">Swipe Up To Level Up or Right for Instructions</div>
            </div>

            <!-- INSTRUCTION PANEL -->
            <div id="instructionPanel" class="instruction-panel hidden">
                <h4>Instructions</h4>
                <ul id="instructionsListSide"></ul>
            </div>

        </div>

    </div>

</div>

<div id="levelPopup" class="level-popup hidden">
    <div class="popup-content">
        <h2>LEVEL UP</h2>
        <p>You just leveled up</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
